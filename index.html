<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的专属小站</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background: #000 url("https://imgur.com/a/4W9hl6w") center/cover no-repeat fixed;
    color: #fff;
    font-family: "宋体", serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}
/* 加一层半透明，让文字更清晰 */
body::after{
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 0;
}
.content{
    z-index: 1;
    text-align: center;
}
h1{
    font-size: 32px;
    letter-spacing: 4px;
    margin-bottom: 10px;
    color: #ddd;
}
.year{
    font-size: 16px;
    color: #888;
    margin-bottom: 40px;
}
.buttons{
    display: flex;
    flex-direction: column;
    gap: 15px;
}
.btn{
    padding: 10px 30px;
    border: 1px solid #c8a97e;
    color: #c8a97e;
    text-decoration: none;
    font-size: 14px;
    letter-spacing: 2px;
    transition: 0.3s;
}
.btn:hover{
    background: #c8a97e;
    color: #000;
}
</style>
</head>
<body>
<div class="content">
    <h1>我的专属小站</h1>
    <div class="year">2026</div>
    <div class="buttons">
        <a href="note.html" class="btn">我的记录</a>
        <a href="gallery.html" class="btn">相册</a>
    </div>
</div>
</body>
</html>
